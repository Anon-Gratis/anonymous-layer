<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>// ANON BROWSER</title>
<style>
:root {
  --bg: #000;
  --amber: #d4a574;
  --amber-bright: #f0c890;
  --amber-dim: rgba(212, 165, 116, 0.55);
  --amber-glow: rgba(212, 165, 116, 0.30);
  --amber-faint: rgba(212, 165, 116, 0.18);
  --mono: ui-monospace, "JetBrains Mono", "Fira Code", "Courier New", monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--amber); font-family: var(--mono); overflow: hidden; }
body { position: relative; display: flex; align-items: center; justify-content: center; }

/* Scanlines */
body::before {
  content: "";
  position: fixed; inset: 0; pointer-events: none; z-index: 100;
  background: repeating-linear-gradient(to bottom,
    rgba(255,255,255,0.018) 0, rgba(255,255,255,0.018) 1px,
    transparent 1px, transparent 3px);
}
/* Vignette */
body::after {
  content: "";
  position: fixed; inset: 0; pointer-events: none; z-index: 99;
  background: radial-gradient(ellipse at center,
    transparent 40%, rgba(0,0,0,0.55) 100%);
}

main {
  position: relative;
  z-index: 1;
  padding: 36px 56px;
  min-width: 480px;
}

/* Corner brackets matching the rest of the app */
.bracket {
  position: absolute;
  width: 28px; height: 28px;
  border: 2px solid var(--amber);
}
.bracket.tl { top: 0; left: 0; border-right: none; border-bottom: none; }
.bracket.tr { top: 0; right: 0; border-left:  none; border-bottom: none; }
.bracket.bl { bottom: 0; left: 0; border-right: none; border-top: none; }
.bracket.br { bottom: 0; right: 0; border-left:  none; border-top: none; }

header {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.2em;
  margin-bottom: 24px;
  text-shadow: 0 0 8px var(--amber-glow);
}
.cursor {
  display: inline-block;
  width: 8px; height: 14px;
  background: var(--amber);
  margin-left: 4px;
  vertical-align: -2px;
  box-shadow: 0 0 6px var(--amber-glow);
  animation: blink 1.2s steps(1, end) infinite;
}
@keyframes blink { 50% { background: transparent; box-shadow: none; } }

.bars { display: flex; flex-direction: column; gap: 14px; }
.bar {
  display: grid;
  grid-template-columns: 70px 1fr 50px;
  gap: 14px;
  align-items: center;
  font-size: 12px;
  letter-spacing: 0.08em;
}
.bar .name { color: var(--amber); text-transform: uppercase; }
.bar .label { color: var(--amber-dim); font-size: 11px; }
.bar .pct { color: var(--amber-bright); text-align: right; font-variant-numeric: tabular-nums; }
.bar .track {
  height: 6px;
  background: rgba(212, 165, 116, 0.08);
  border: 1px solid var(--amber-faint);
  position: relative;
  overflow: hidden;
}
.bar .fill {
  position: absolute;
  top: 0; bottom: 0; left: 0;
  background: linear-gradient(to right, var(--amber-dim), var(--amber));
  box-shadow: 0 0 8px var(--amber-glow);
  width: 0%;
  transition: width 240ms ease-out;
}

.row { display: contents; }
.label-row {
  display: grid;
  grid-template-columns: 70px 1fr 50px;
  gap: 14px;
  font-size: 10px;
  color: var(--amber-dim);
  margin-top: 2px;
  letter-spacing: 0.06em;
}
.label-row .label { grid-column: 2; }
</style>
</head>
<body>
<main>
  <span class="bracket tl"></span>
  <span class="bracket tr"></span>
  <span class="bracket bl"></span>
  <span class="bracket br"></span>
  <header>// ANON BROWSER<span class="cursor"></span></header>
  <div class="bars" id="bars"></div>
</main>
<script>
(() => {
  // Bars are declared on the JS side; the Go layer just sends events
  // by name. New names auto-create a row. Order of first appearance =
  // visual order top-to-bottom.
  const bars = new Map();
  const container = document.getElementById('bars');

  function ensureRow(name) {
    if (bars.has(name)) return bars.get(name);
    const row = document.createElement('div');
    row.className = 'bar';
    row.innerHTML =
      '<span class="name"></span>' +
      '<div class="track"><div class="fill"></div></div>' +
      '<span class="pct">0%</span>';
    row.querySelector('.name').textContent = name;
    const labelRow = document.createElement('div');
    labelRow.className = 'label-row';
    labelRow.innerHTML = '<span class="label"></span>';
    container.appendChild(row);
    container.appendChild(labelRow);
    const ref = {
      row, labelRow,
      fill: row.querySelector('.fill'),
      pct: row.querySelector('.pct'),
      label: labelRow.querySelector('.label'),
      done: false,
    };
    bars.set(name, ref);
    return ref;
  }

  function checkAllDone() {
    if (bars.size === 0) return false;
    for (const v of bars.values()) if (!v.done) return false;
    return true;
  }

  // Exposed to Go via webview.Bind.
  window.anonProgress = (name, pct, label) => {
    const ref = ensureRow(name);
    ref.fill.style.width = Math.max(0, Math.min(100, pct)) + '%';
    ref.pct.textContent = (pct | 0) + '%';
    if (label) ref.label.textContent = label;
    if (pct >= 100) {
      ref.done = true;
      if (checkAllDone()) {
        // 350ms tail so the user can see the bars completed before
        // the window dismisses.
        setTimeout(() => { try { window.splashDone(); } catch (_) {} }, 350);
      }
    }
  };

  // Initial empty state so the window has visible content from frame 0.
  ensureRow('init').label.textContent = 'starting…';
})();
</script>
</body>
</html>
