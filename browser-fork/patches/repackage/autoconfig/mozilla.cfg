// Anon Browser — startup config (autoconfig / mozilla.cfg).
//
// Loaded by Firefox at startup because Browser/defaults/pref/
// anon-autoconfig.js sets general.config.filename = "mozilla.cfg".
// Runs with sandbox_enabled = false, so Services, Cc/Ci/Cu are
// available as globals — there is nothing to import.
//
// First line is REQUIRED to be a comment (parser skips it) — real
// code starts on line 2.

// ---------- helpers ----------

function anon_log(msg) {
  try { Cu.reportError("[anon] " + msg); } catch (_) {}
  // Also append to a file so we can tail it without needing the
  // Browser Console open.
  try {
    const f = Cc["@mozilla.org/file/local;1"].createInstance(Ci.nsIFile);
    f.initWithPath("/tmp/anon-debug.log");
    const stream = Cc["@mozilla.org/network/file-output-stream;1"]
      .createInstance(Ci.nsIFileOutputStream);
    // 0x02 write | 0x08 create | 0x10 append
    stream.init(f, 0x02 | 0x08 | 0x10, 0o644, 0);
    const line = "[" + new Date().toISOString() + "] " + msg + "\n";
    stream.write(line, line.length);
    stream.close();
  } catch (_) {}
}

function anon_install_dir() {
  // Two supported install layouts:
  //   * Vanilla Firefox repackage: libxul lives AT the install root —
  //     GreD === install root.
  //   * Mullvad Browser / TBB repackage: libxul lives at
  //     <install>/Browser/libxul.so — install root is GreD.parent.
  //
  // Detect by looking for a sentinel that's only present at the install
  // root in both layouts: "AnonLayer/" (the bundled tor + node + bridge
  // tree the launcher always lays down at the top level).
  const greDir = Services.dirsvc.get("GreD", Ci.nsIFile);

  const hasAnonLayer = (dir) => {
    try {
      const probe = dir.clone();
      probe.append("AnonLayer");
      return probe.exists() && probe.isDirectory();
    } catch (_) { return false; }
  };

  if (hasAnonLayer(greDir)) return greDir;            // vanilla layout

  if (greDir.parent && hasAnonLayer(greDir.parent)) { // mullvad/TBB layout
    return greDir.parent;
  }

  // Neither layout matched. Log + fall back to GreD so the caller at
  // least gets *some* path; subsequent .append calls will then fail
  // loudly with a path that doesn't exist, which is better than
  // silently writing PAC config into the wrong tree.
  try { Cu.reportError("[anon] anon_install_dir: AnonLayer/ not found at GreD or GreD.parent — falling back to GreD"); }
  catch (_) {}
  return greDir;
}

try {
  // fetch / URL aren't in mozilla.cfg's sandbox by default — pull them
  // in so the chrome-side circuit popup can hit the bridge's /api/...
  // endpoints without needing to fall back to nsIXMLHttpRequest.
  try { Cu.importGlobalProperties(["fetch", "URL", "TextEncoder"]); } catch (_) {}

  const installDir = anon_install_dir();

  // ---------- 1. Force the legacy customization pref on. ----------
  Services.prefs.getDefaultBranch("")
          .setBoolPref("toolkit.legacyUserProfileCustomizations.stylesheets",
                       true);

  // ---------- 2. Inject userChrome / userContent as USER_SHEETs. ----------
  const sss = Cc["@mozilla.org/content/style-sheet-service;1"]
                .getService(Ci.nsIStyleSheetService);

  // Chrome stylesheets always live next to libxul (i.e. inside GreD),
  // not at the install root. The repackager puts them at
  // <GreD>/defaults/profile/chrome/. This is true in BOTH layouts:
  //   * Vanilla:  GreD == install root             → <install>/defaults/...
  //   * Mullvad:  GreD == <install>/Browser/        → <install>/Browser/defaults/...
  // installDir (the AnonLayer root) is the wrong base — that lives one
  // level UP from GreD in the Mullvad case and would point at
  // defaults/profile/chrome under the install ROOT, which doesn't exist.
  const chromeDir = Services.dirsvc.get("GreD", Ci.nsIFile).clone();
  chromeDir.append("defaults");
  chromeDir.append("profile");
  chromeDir.append("chrome");

  for (const name of ["userChrome.css", "userContent.css"]) {
    const f = chromeDir.clone();
    f.append(name);
    if (!f.exists()) {
      anon_log("chrome stylesheet missing: " + f.path);
      continue;
    }
    const uri = Services.io.newFileURI(f);
    if (!sss.sheetRegistered(uri, sss.USER_SHEET)) {
      sss.loadAndRegisterSheet(uri, sss.USER_SHEET);
      anon_log("registered USER_SHEET: " + f.path);
    }
  }

  // ---------- 3. Tor PAC proxy (for .onion access). ----------
  //
  // Set as USER prefs (lockPref) so the value sticks visibly in
  // prefs.js and survives even if some other code path resets the
  // default branch. We re-set every launch — that's fine, it's
  // cheap and the PAC URL path is stable across launches anyway.
  //
  // The launcher writes <install>/AnonLayer/tor/run/anon.pac with
  // the per-launch SOCKS port. If absent (tor disabled, dev run,
  // or failed to start), force proxy.type = 0 so we don't sit
  // pointing at a stale config.

  const pacFile = installDir.clone();
  pacFile.append("AnonLayer");
  pacFile.append("tor");
  pacFile.append("run");
  pacFile.append("anon.pac");

  anon_log("install dir = " + installDir.path);
  anon_log("PAC path    = " + pacFile.path + " (exists=" + pacFile.exists() + ")");

  if (pacFile.exists()) {
    const pacUri = Services.io.newFileURI(pacFile).spec;
    // Use lockPref so this value is enforced — anything trying to
    // unset proxy.type at runtime would otherwise leave us routing
    // .onion to nowhere.
    lockPref("network.proxy.type", 2);                  // 2 = PAC
    lockPref("network.proxy.autoconfig_url", pacUri);
    lockPref("network.proxy.socks_remote_dns", true);
    lockPref("network.trr.mode", 5);                    // disable DoH
    lockPref("network.proxy.no_proxies_on",
             "127.0.0.1, localhost, ::1");
    lockPref("network.dns.blockDotOnion", false);

    // Decorate the root element so userChrome.css can show a
    // "Tor: ready" pip in the navbar (set via :root[anon-tor="on"]).
    Services.prefs.setBoolPref("anon.tor.enabled", true);

    anon_log("PAC armed -> " + pacUri);
  } else {
    lockPref("network.proxy.type", 0);
    Services.prefs.setBoolPref("anon.tor.enabled", false);
    anon_log("PAC absent — proxy off");
  }

  // ---------- 3.5. Allow http://localhost (bridge) under HTTPS-Only. ----------
  //
  // Mullvad Browser defaults to HTTPS-Only mode. Without an exception,
  // http://127.0.0.1:1081 (the local anon-layer bridge UI) gets
  // upgraded to https://, which fails (the bridge serves plain HTTP)
  // — user sees a blocked/blank page. Disabling the localhost-upgrade
  // path lets http:// loopback work while keeping HTTPS-Only on for
  // the rest of the web.
  lockPref("dom.security.https_only_mode.upgrade_local", false);

  // Suppress the "Some of Anonymous's security features may offer less
  // protection on your current operating system" notification bar.
  // Firefox shows this when unprivileged user namespaces aren't
  // available (kernel.unprivileged_userns_clone = 0, a Debian default).
  // The warning isn't actionable for most users and clutters the UI.
  // The underlying sandbox limitation is unchanged — only the
  // notification is hidden.
  lockPref("security.sandbox.warn_unprivileged_namespaces", false);

  // ---------- 3.7. Anonymous Browser aesthetic prefs ----------
  //
  // Terminal/monospace theme; the heavy lifting is in userChrome.css
  // and userContent.css. These prefs just set the right defaults
  // so Firefox doesn't fight us (e.g. shipping its built-in light
  // theme on first run, or activity-stream's top-sites grid).

  // Force dark color scheme — Firefox's "auto" picks based on system
  // theme, but we want the chrome dark regardless.
  defaultPref("browser.theme.toolbar-theme", 0);          // 0=dark
  defaultPref("browser.theme.content-theme", 0);          // 0=dark
  defaultPref("layout.css.prefers-color-scheme.content-override", 0); // 0=dark
  defaultPref("ui.systemUsesDarkTheme", 1);

  // Home page = bridge landing page (custom [ANONYMOUS] lockup +
  // search/anon:// input rendered by anon-browse-gui.mjs).
  defaultPref("browser.startup.homepage", "http://127.0.0.1:1081/");
  defaultPref("browser.startup.page", 1);   // 1 = open homepage on start

  // New tab → same landing page. Firefox's `browser.newtab.url` was
  // removed in 41, but `browser.newtabpage.activity-stream.*` plus an
  // explicit override give us a clean replacement.
  defaultPref("browser.newtabpage.enabled", true);
  defaultPref("browser.newtabpage.activity-stream.feeds.section.topstories", false);
  defaultPref("browser.newtabpage.activity-stream.feeds.topsites", false);
  defaultPref("browser.newtabpage.activity-stream.showSearch", false);
  defaultPref("browser.newtabpage.activity-stream.showSponsored", false);
  defaultPref("browser.newtabpage.activity-stream.showSponsoredTopSites", false);
  defaultPref("browser.newtabpage.activity-stream.feeds.snippets", false);
  defaultPref("browser.newtabpage.activity-stream.system.showSponsored", false);

  // ---------- 4. Toolbar widgets: NEW IDENTITY + Tor status ----------
  //
  // We register widgets in CustomizableUI so they appear in the
  // navbar by default (and the user can move/remove via Customize…).
  // Done lazily on the first browser-window load so DOM is ready.
  //
  // NEW IDENTITY: restarts the browser. The launcher wipes the tor
  // data dir on each start, so a restart = a fresh tor identity +
  // a fresh browser session (cookies/storage cleared by the engine
  // on quit thanks to mullvad-browser defaults). Not as cheap as
  // tor's NEWNYM signal, but bulletproof and matches user
  // expectations of "start over".
  //
  // TOR STATUS: a static pip showing whether tor was reachable
  // when this session started.

  const { CustomizableUI } =
      ChromeUtils.importESModule("resource:///modules/CustomizableUI.sys.mjs");

  const NEW_IDENTITY_ID  = "anon-new-identity-button";
  const TOR_STATUS_ID    = "anon-tor-status-button";
  const PANIC_ID         = "anon-panic-button";
  const VOLATILE_ID      = "anon-volatile-button";
  const ONION_ONLY_ID    = "anon-onion-only-button";
  const ONION_ONLY_PREF  = "anon.onion-only.enabled";

  // ---------- Restart-via-launcher helper ----------
  //
  // Services.startup.quit(... | eRestart) relaunches the BROWSER
  // BINARY but bypasses the wrapping launcher script — which means
  // the Node bridge process the launcher manages dies and never
  // comes back. After such a "restart" the user can still open
  // tabs but every anon:// load fails (connection refused on the
  // bridge port).
  //
  // Workaround: drop a one-shot marker file the launcher reads
  // *after* the engine exits, then quit *without* eRestart. The
  // launcher detects the marker, deletes it, and re-execs itself,
  // which restarts tor + bridge + browser cleanly.
  //
  // Used by New Identity, Panic, and Volatile.
  const launcherRestart = () => {
    try {
      const marker = installDir.clone();
      marker.append("AnonLayer");
      marker.append(".restart");
      const stream = Cc["@mozilla.org/network/file-output-stream;1"]
        .createInstance(Ci.nsIFileOutputStream);
      // 0x02 write | 0x08 create | 0x20 truncate
      stream.init(marker, 0x02 | 0x08 | 0x20, 0o600, 0);
      const data = String(Date.now()) + "\n";
      stream.write(data, data.length);
      stream.close();
      anon_log("launcherRestart: marker dropped at " + marker.path);
    } catch (e) {
      anon_log("launcherRestart marker write failed: " + e +
        " — will quit but bridge may not respawn");
    }
    try {
      // Plain attempt-quit. No eRestart — the launcher does the relaunch.
      Services.startup.quit(Ci.nsIAppStartup.eAttemptQuit);
    } catch (e) {
      anon_log("launcherRestart quit failed: " + e);
    }
  };

  // Handlers extracted as top-level so both CustomizableUI.createWidget
  // and the manual DOM placement (further down) call the same logic.
  const onNewIdentityCommand = () => {
    launcherRestart();
  };
  // ---------- Circuit-display popup (on Tor-status click) ----------
  //
  // Tor Browser shows the 3-hop circuit when you click the onion in
  // the address bar. We give the anon: net the same treatment via the
  // /api/circuit endpoint the bridge exposes (bin/anon-browse-gui.mjs).
  //
  // On click we look at the focused tab's URL bar. If it's anon://,
  // we ask the bridge for the topology and render it in a popup
  // anchored on the Tor-status button. If not, we just show a
  // "no anon:// page open" hint.
  //
  // ANON_BRIDGE_BASE is declared LATER in this file (section 6) but
  // we only need it at click time, after mozilla.cfg has fully run —
  // so resolve lazily inside the function rather than at top level
  // (top-level read would hit the const's temporal dead zone).

  const currentAnonUrl = (win) => {
    try {
      const browser = win && win.gBrowser && win.gBrowser.selectedBrowser;
      if (!browser || !browser.currentURI) return null;
      const spec = browser.currentURI.spec;
      // Either we're on the bridge with ?url=anon:// (look up via
      // pretty registry) OR the URL bar is showing anon:// directly.
      const fromBar = (win.gURLBar && win.gURLBar.value) || "";
      if (/^anon:\/\//i.test(fromBar)) return fromBar.split(/[\s#]/)[0];
      const fromPretty = lookupPretty(browser, spec);
      if (fromPretty) return fromPretty;
      return null;
    } catch (_) { return null; }
  };

  const renderCircuitRow = (doc, label, p) => {
    const row = doc.createXULElement("vbox");
    row.className = "anon-circuit-row";
    const h = doc.createXULElement("description");
    h.className = "anon-circuit-row-header";
    h.textContent = label;
    row.appendChild(h);
    if (!p) {
      const empty = doc.createXULElement("description");
      empty.className = "anon-circuit-empty";
      empty.textContent = "— no path recorded yet —";
      row.appendChild(empty);
      return row;
    }
    const formatHop = (hop, kind) => {
      const d = doc.createXULElement("description");
      d.className = "anon-circuit-hop";
      const nick = (hop && hop.nick) || "?";
      const fp = (hop && hop.fp) || "????????";
      const addr = (hop && hop.addr) ? "  " + hop.addr : "";
      d.textContent = kind + "  " + nick + "  [" + fp + "]" + addr;
      return d;
    };
    row.appendChild(formatHop(p.guard,  " 1. guard "));
    row.appendChild(formatHop(p.middle, " 2. middle"));
    row.appendChild(formatHop(p.exit,   " 3. exit  "));
    return row;
  };

  const showCircuitPopup = async (win, anchorBtn) => {
    try {
      const doc = win.document;
      const oldPopup = doc.getElementById("anon-circuit-popup");
      if (oldPopup) oldPopup.remove();

      const popup = doc.createXULElement("panel");
      popup.id = "anon-circuit-popup";
      popup.classList.add("anon-circuit-popup");
      popup.setAttribute("type", "arrow");
      popup.setAttribute("noautohide", "false");

      const body = doc.createXULElement("vbox");
      body.className = "anon-circuit-body";

      const title = doc.createXULElement("description");
      title.className = "anon-circuit-title";
      title.textContent = "// CIRCUIT";
      body.appendChild(title);

      const status = doc.createXULElement("description");
      status.className = "anon-circuit-status";
      status.textContent = "loading…";
      body.appendChild(status);

      popup.appendChild(body);
      doc.documentElement.appendChild(popup);
      popup.openPopup(anchorBtn, "after_start");

      const anonUrl = currentAnonUrl(win);
      if (!anonUrl) {
        status.textContent = "no anon:// page open in this tab.";
        return;
      }
      status.textContent = "host: " + anonUrl.replace(/^anon:\/\//i, "");

      // Chrome can cross-origin-fetch loopback without trouble.
      // Use the chrome-global fetch (imported at the top of this file)
      // rather than win.fetch so we don't trip on content/chrome
      // principal mismatches that some Firefox versions enforce.
      // Resolve the bridge base lazily — it's declared later in this
      // file but exists by the time the user clicks anything.
      const apiUrl = ANON_BRIDGE_BASE + "/api/circuit?url=" + encodeURIComponent(anonUrl);
      let data = null;
      try {
        const resp = await fetch(apiUrl, { cache: "no-store" });
        data = await resp.json();
      } catch (e) {
        const err = doc.createXULElement("description");
        err.className = "anon-circuit-empty";
        err.textContent = "bridge unreachable: " + (e.message || e);
        body.appendChild(err);
        return;
      }

      if (data && data.error) {
        const err = doc.createXULElement("description");
        err.className = "anon-circuit-empty";
        err.textContent = data.error;
        body.appendChild(err);
        return;
      }

      // Header: descriptor + state
      const stateLine = doc.createXULElement("description");
      stateLine.className = "anon-circuit-meta";
      stateLine.textContent = "state: " + (data.state || "?")
        + "   descriptor: " + ((data.descriptor && data.descriptor.addr_fp) || "?");
      body.appendChild(stateLine);

      const sep = doc.createXULElement("box");
      sep.className = "anon-circuit-sep";
      body.appendChild(sep);

      // Latest RP path + latest IP path
      const latestRp = (data.rpPaths && data.rpPaths.length)
        ? data.rpPaths[data.rpPaths.length - 1] : null;
      const latestIp = (data.ipPaths && data.ipPaths.length)
        ? data.ipPaths[data.ipPaths.length - 1] : null;

      body.appendChild(renderCircuitRow(doc, "RENDEZVOUS PATH (client → RP)", latestRp));
      body.appendChild(renderCircuitRow(doc, "INTRO PATH (client → IP)",       latestIp));
    } catch (e) {
      anon_log("showCircuitPopup threw: " + e);
    }
  };

  const onTorStatusCommand = (event) => {
    try {
      const btn = event && event.target;
      if (!btn || !btn.ownerDocument) return;
      const win = btn.ownerDocument.defaultView;
      showCircuitPopup(win, btn);
    } catch (e) { anon_log("tor-status click failed: " + e); }
  };

  // PANIC: wipe every shred of local browsing state we can reach via
  // the ClearDataService (cookies, IDB, DOM storage, cache, history,
  // form/login data, perms, plugin data, downloads, network cache,
  // service-worker registrations…), pin sessionstore to NOT recover
  // on next launch, then restart. Combined with the launcher's
  // tor-data-dir wipe-on-start, a fresh process comes up with no
  // cross-session linkability to what was on screen 200ms ago.
  //
  // Bound to Ctrl+Alt+P by default (registered per window further
  // down in installUrlbarHook). Toolbar button is the visible
  // affordance; the keybind is what the user actually reaches for
  // when something goes wrong on screen.
  const onPanicCommand = () => {
    anon_log("PANIC: wiping local state and restarting");
    const doRestart = () => {
      try {
        Services.prefs.setBoolPref(
          "browser.sessionstore.resume_from_crash", false);
        Services.prefs.setIntPref("browser.startup.page", 1); // 1=home
      } catch (_) {}
      // Marker-based restart so the launcher respawns tor + bridge.
      launcherRestart();
    };
    try {
      const cd = Services.clearData;
      if (cd && typeof cd.deleteData === "function") {
        // CLEAR_ALL covers every documented flag. Async; restart in
        // the callback so we don't race with the unlink.
        cd.deleteData(cd.CLEAR_ALL, (rv) => {
          anon_log("clearData returned " + rv);
          doRestart();
        });
      } else {
        anon_log("Services.clearData unavailable — restart only");
        doRestart();
      }
    } catch (e) {
      anon_log("panic clearData threw: " + e);
      doRestart();
    }
  };

  if (!CustomizableUI.getWidget(NEW_IDENTITY_ID)) {
    CustomizableUI.createWidget({
      id: NEW_IDENTITY_ID,
      type: "button",
      label: "New Identity",
      tooltiptext: "Restart the browser with a fresh Tor circuit and a clean session.",
      defaultArea: CustomizableUI.AREA_NAVBAR,
      onCommand: onNewIdentityCommand,
    });
  }

  if (!CustomizableUI.getWidget(TOR_STATUS_ID)) {
    const torOn = pacFile.exists();
    CustomizableUI.createWidget({
      id: TOR_STATUS_ID,
      type: "button",
      label: torOn ? "Tor: on" : "Tor: off",
      tooltiptext: torOn
        ? "Tor is running. .onion sites route through Tor; clearnet is direct."
        : "Tor is not running. .onion sites will fail to load.",
      defaultArea: CustomizableUI.AREA_NAVBAR,
      onCommand: onTorStatusCommand,
    });
  }

  if (!CustomizableUI.getWidget(PANIC_ID)) {
    CustomizableUI.createWidget({
      id: PANIC_ID,
      type: "button",
      label: "Panic",
      tooltiptext: "Wipe cookies, history, cache, storage — then restart. (Ctrl+Alt+P)",
      defaultArea: CustomizableUI.AREA_NAVBAR,
      onCommand: onPanicCommand,
    });
  }

  // ---------- Volatile (RAM-only profile) toggle ----------
  //
  // Detects whether *this* session is running in volatile mode by
  // checking whether the profile dir path matches the launcher's
  // tmpfs naming pattern (/run/user/<uid>/anon-volatile-<pid>).
  //
  // Toggling drops/clears a marker file at $ROOT/AnonLayer/.volatile
  // that the launcher consumes on next startup, then restarts.
  // Marker is one-shot: launcher deletes it on read so the *next*
  // launch reverts to whichever mode you don't want anymore unless
  // you toggle again.
  const isVolatileSession = () => {
    try {
      const profD = Services.dirsvc.get("ProfD", Ci.nsIFile).path;
      return /\banon-volatile-\d+\b/.test(profD);
    } catch (_) { return false; }
  };

  const onVolatileCommand = () => {
    const wantVolatile = !isVolatileSession();
    try {
      const markerFile = installDir.clone();
      markerFile.append("AnonLayer");
      markerFile.append(".volatile");
      if (wantVolatile) {
        // Write marker — launcher will mount tmpfs profile next launch.
        const stream = Cc["@mozilla.org/network/file-output-stream;1"]
          .createInstance(Ci.nsIFileOutputStream);
        // 0x02 write | 0x08 create | 0x20 truncate
        stream.init(markerFile, 0x02 | 0x08 | 0x20, 0o600, 0);
        const data = String(Date.now()) + "\n";
        stream.write(data, data.length);
        stream.close();
        anon_log("VOLATILE: marker written at " + markerFile.path);
      } else {
        // Already volatile; just don't re-arm the marker, restart.
        // (If a stale marker exists from manual creation, remove it.)
        if (markerFile.exists()) {
          try { markerFile.remove(false); } catch (_) {}
        }
        anon_log("VOLATILE: leaving volatile mode on next launch");
      }
    } catch (e) {
      anon_log("volatile toggle marker write failed: " + e);
      return;   // don't restart if the toggle itself failed
    }
    // Marker-based restart so the launcher respawns tor + bridge AND
    // also reads the volatile marker on the way back up.
    launcherRestart();
  };

  if (!CustomizableUI.getWidget(VOLATILE_ID)) {
    const volNow = isVolatileSession();
    CustomizableUI.createWidget({
      id: VOLATILE_ID,
      type: "button",
      label: volNow ? "Volatile: on" : "Volatile: off",
      tooltiptext: volNow
        ? "Profile is in tmpfs and will be wiped on exit. Click to switch back to persistent."
        : "Click to restart with a RAM-only profile. Profile gone on next exit.",
      defaultArea: CustomizableUI.AREA_NAVBAR,
      onCommand: onVolatileCommand,
    });
  }

  // ---------- Onion-only mode ----------
  //
  // When enabled, the request observer (section 6) cancels every
  // HTTP(S) request whose destination is not loopback, .onion, or
  // .anon. Stops the user from accidentally visiting a clearnet site
  // — and stops a malicious or compromised .anon/.onion page from
  // forcing a clearnet sub-request to dox the user.
  //
  // Toggling re-labels the button + flips the pref. No restart
  // needed; the request observer reads the pref live on every fire.
  const isOnionOnlyEnabled = () => {
    try { return Services.prefs.getBoolPref(ONION_ONLY_PREF, false); }
    catch (_) { return false; }
  };

  const setOnionOnly = (val) => {
    try {
      Services.prefs.setBoolPref(ONION_ONLY_PREF, !!val);
      // Update every open window's button label in lockstep.
      for (const w of Services.wm.getEnumerator("navigator:browser")) {
        const btn = w.document.getElementById(ONION_ONLY_ID);
        if (btn) {
          btn.setAttribute("label", val ? "Onion-only: on" : "Onion-only: off");
          btn.setAttribute("anon-onion-only", val ? "on" : "off");
        }
      }
      anon_log("ONION-ONLY: " + (val ? "ON" : "OFF"));
    } catch (e) { anon_log("setOnionOnly failed: " + e); }
  };

  const onOnionOnlyCommand = () => {
    setOnionOnly(!isOnionOnlyEnabled());
  };

  if (!CustomizableUI.getWidget(ONION_ONLY_ID)) {
    const onNow = isOnionOnlyEnabled();
    CustomizableUI.createWidget({
      id: ONION_ONLY_ID,
      type: "button",
      label: onNow ? "Onion-only: on" : "Onion-only: off",
      tooltiptext: "When on, blocks every clearnet request. Only .onion / .anon / loopback load.",
      defaultArea: CustomizableUI.AREA_NAVBAR,
      onCreated(node) {
        node.setAttribute("anon-onion-only", onNow ? "on" : "off");
      },
      onCommand: onOnionOnlyCommand,
    });
  }

  // ---------- 4b. SECURITY LEVEL button ----------
  //
  // Mirrors Tor Browser's three-tier shield button:
  //   0 Standard  — defaults, best site compatibility
  //   1 Safer     — disables JIT, WASM, WebRTC, Web Audio, SVG fonts
  //   2 Safest    — also disables JavaScript, SVG, service workers
  //
  // Persisted in `anon.security.level` (int). Applied at startup and
  // whenever the user picks a level from the menupopup. Some prefs
  // (JIT in particular) need a browser restart to fully take effect;
  // most apply on the next page load.
  //
  // The shield icon comes from userChrome.css via list-style-image.
  // The button's label tracks the current level so users see at a
  // glance which posture is active.

  const SEC_LEVEL_ID = "anon-security-level-button";
  const SEC_LEVEL_PREF = "anon.security.level";
  const SEC_LEVELS = [
    // WebRTC (media.peerconnection.enabled) stays OFF at every tier —
    // it's a real-IP leak vector that bypasses SOCKS via ICE host
    // candidates, and at-risk users get no benefit from letting sites
    // opt them back into it. user.js pins it false; we don't override.
    { level: 0, name: "Standard",
      desc: "Best site compatibility. WebRTC stays off (real-IP leak).",
      prefs: {
        "javascript.enabled": true,
        "javascript.options.wasm": true,
        "javascript.options.ion": true,
        "javascript.options.baselinejit": true,
        "media.webaudio.enabled": true,
        "gfx.font_rendering.opentype_svg.enabled": true,
        "svg.disabled": false,
        "webgl.disabled": false,
        "dom.serviceWorkers.enabled": true,
      } },
    { level: 1, name: "Safer",
      desc: "JIT, WASM, WebGL, Web Audio, SVG fonts disabled.",
      prefs: {
        "javascript.enabled": true,
        "javascript.options.wasm": false,
        "javascript.options.ion": false,
        "javascript.options.baselinejit": false,
        "media.webaudio.enabled": false,
        "gfx.font_rendering.opentype_svg.enabled": false,
        "svg.disabled": false,
        "webgl.disabled": true,
        "dom.serviceWorkers.enabled": true,
      } },
    { level: 2, name: "Safest",
      desc: "JavaScript, SVG, WebGL, and service workers disabled.",
      prefs: {
        "javascript.enabled": false,
        "javascript.options.wasm": false,
        "javascript.options.ion": false,
        "javascript.options.baselinejit": false,
        "media.webaudio.enabled": false,
        "gfx.font_rendering.opentype_svg.enabled": false,
        "svg.disabled": true,
        "webgl.disabled": true,
        "dom.serviceWorkers.enabled": false,
      } },
  ];

  const applySecLevel = (lvl) => {
    const def = SEC_LEVELS.find(s => s.level === lvl) || SEC_LEVELS[0];
    for (const [k, v] of Object.entries(def.prefs)) {
      if (typeof v === "boolean") {
        Services.prefs.setBoolPref(k, v);
      } else {
        Services.prefs.setIntPref(k, v);
      }
    }
    Services.prefs.setIntPref(SEC_LEVEL_PREF, def.level);
    anon_log("security level applied: " + def.name);
    return def;
  };

  // Apply the persisted level on every launch — Firefox doesn't keep
  // the user-branch prefs in sync with our defaults; on a fresh
  // profile this gives us a deterministic baseline.
  const startupLevel = (() => {
    try { return Services.prefs.getIntPref(SEC_LEVEL_PREF, 0); }
    catch { return 0; }
  })();
  applySecLevel(startupLevel);

  const onSecurityLevelCommand = (event) => {
    const button = event.target;
    const doc = button.ownerDocument;
    const current = Services.prefs.getIntPref(SEC_LEVEL_PREF, 0);

    // Reuse an existing popup so repeated clicks don't accrete DOM.
    let popup = doc.getElementById("anon-security-level-popup");
    if (popup) popup.remove();
    popup = doc.createXULElement("menupopup");
    popup.id = "anon-security-level-popup";
    popup.classList.add("anon-security-level-popup");

    // Header item (label only, disabled).
    const header = doc.createXULElement("menuitem");
    header.setAttribute("label", "Security Level");
    header.setAttribute("disabled", "true");
    header.classList.add("anon-sec-header");
    popup.appendChild(header);
    popup.appendChild(doc.createXULElement("menuseparator"));

    for (const lvl of SEC_LEVELS) {
      const item = doc.createXULElement("menuitem");
      item.setAttribute("label", lvl.name + "  —  " + lvl.desc);
      item.setAttribute("type", "radio");
      item.setAttribute("name", "anon-security-level");
      item.setAttribute("anon-level", String(lvl.level));
      if (lvl.level === current) {
        item.setAttribute("checked", "true");
      }
      item.classList.add("anon-sec-item");
      item.addEventListener("command", () => {
        applySecLevel(lvl.level);
        // Update all open windows' buttons in lockstep.
        for (const otherWin of Services.wm.getEnumerator("navigator:browser")) {
          const otherButton = otherWin.document.getElementById(SEC_LEVEL_ID);
          if (otherButton) {
            otherButton.setAttribute("label", lvl.name);
            otherButton.setAttribute("anon-security-level", String(lvl.level));
          }
        }
      });
      popup.appendChild(item);
    }

    // Footer hint about restart for JIT-impacting changes.
    popup.appendChild(doc.createXULElement("menuseparator"));
    const hint = doc.createXULElement("menuitem");
    hint.setAttribute("label",
      "JIT changes apply on next browser restart.");
    hint.setAttribute("disabled", "true");
    hint.classList.add("anon-sec-hint");
    popup.appendChild(hint);

    doc.documentElement.appendChild(popup);
    popup.openPopup(button, "after_start");
  };

  if (!CustomizableUI.getWidget(SEC_LEVEL_ID)) {
    CustomizableUI.createWidget({
      id: SEC_LEVEL_ID,
      type: "button",
      label: SEC_LEVELS[startupLevel].name,
      tooltiptext: "Security Level — click to change.",
      defaultArea: CustomizableUI.AREA_NAVBAR,
      onCreated(node) {
        node.setAttribute("anon-security-level",
                          String(Services.prefs.getIntPref(SEC_LEVEL_PREF, 0)));
      },
      onCommand: onSecurityLevelCommand,
    });
  }

  // ----- One-time UI migration to place our widgets predictably -----
  //
  // Existing profiles have a saved nav-bar layout (browser.uiCustomization
  // .state) that:
  //   (a) References stale widget IDs from before the Mullvad→vanilla
  //       pivot (e.g. "new-identity-button" — now renamed to
  //       "anon-new-identity-button") and from the removed WebExtension
  //       ("anon-layer_anon_gratis-browser-action").
  //   (b) Doesn't contain our new widgets at all, so addWidgetToArea
  //       without a position appends them at the very end — past the
  //       extension area, in the overflow palette, invisibly.
  //
  // CustomizableUI areas aren't populated yet when autoconfig runs, so
  // this has to be deferred until the toolbar is restored.
  // browser-delayed-startup-finished fires per browser window right
  // after CustomizableUI finishes restoring areas from the saved state.
  const UI_MIGRATION_PREF = "anon.ui.migration.v1";
  const runUiMigration = () => {
    const migrated = (() => {
      try { return Services.prefs.getBoolPref(UI_MIGRATION_PREF, false); }
      catch { return false; }
    })();

    if (!migrated) {
      try {
        // 1. Remove stale IDs from anywhere in the toolbar layout.
        for (const staleId of [
          "new-identity-button",                    // pre-pivot rename
          "anon-layer_anon_gratis-browser-action",  // removed extension
        ]) {
          try { CustomizableUI.removeWidgetFromArea(staleId); }
          catch (_) { /* widget unknown — that's fine */ }
        }

        // 2. Re-position our three anon widgets in a known order near
        //    the URL bar. Find the urlbar-container index so we insert
        //    right after it regardless of any reordering of back/fwd.
        const navbarPlacements =
          CustomizableUI.getWidgetIdsInArea(CustomizableUI.AREA_NAVBAR);
        const urlbarIdx = navbarPlacements.indexOf("urlbar-container");
        const insertAt = urlbarIdx >= 0
          ? urlbarIdx + 1
          : navbarPlacements.length;

        // Insert in reverse order so the final reading order is
        //   urlbar | SHIELD | NEW IDENTITY | PANIC | VOLATILE | ONION-ONLY | TOR STATUS
        for (const id of [TOR_STATUS_ID, ONION_ONLY_ID, VOLATILE_ID, PANIC_ID, NEW_IDENTITY_ID, SEC_LEVEL_ID]) {
          try { CustomizableUI.removeWidgetFromArea(id); }
          catch (_) {}
          CustomizableUI.addWidgetToArea(id,
                                         CustomizableUI.AREA_NAVBAR,
                                         insertAt);
        }

        Services.prefs.setBoolPref(UI_MIGRATION_PREF, true);
        anon_log("ran ui migration v1: positioned anon widgets after urlbar");
      } catch (e) {
        anon_log("ui migration v1 failed: " + e);
      }
    } else {
      // Migration already done — only ensure the widgets are present
      // somewhere. If user moved them via Customize…, leave that be.
      //
      // For buttons added AFTER the initial v1 migration ran (Panic,
      // Volatile, Onion-only), addWidgetToArea without a position
      // would land them at the END of the navbar instead of next to
      // the other anon widgets. Instead, splice them in right after
      // urlbar-container — same insertion point the v1 migration uses.
      try {
        const navbarPlacements =
          CustomizableUI.getWidgetIdsInArea(CustomizableUI.AREA_NAVBAR);
        const urlbarIdx = navbarPlacements.indexOf("urlbar-container");
        let insertAt = urlbarIdx >= 0 ? urlbarIdx + 1 : navbarPlacements.length;

        // Same right-to-left order as v1: TOR, ONION_ONLY, VOLATILE,
        // PANIC, NEW_ID, SEC — each new one slides into insertAt and
        // the others to its right shift over.
        for (const id of [TOR_STATUS_ID, ONION_ONLY_ID, VOLATILE_ID, PANIC_ID, NEW_IDENTITY_ID, SEC_LEVEL_ID]) {
          if (!CustomizableUI.getPlacementOfWidget(id)) {
            CustomizableUI.addWidgetToArea(id,
                                           CustomizableUI.AREA_NAVBAR,
                                           insertAt);
            anon_log("post-v1 placed " + id + " at navbar idx " + insertAt);
          }
        }
      } catch (e) {
        anon_log("post-v1 placement failed: " + e);
      }
    }
  };

  // Fire once on the first window's delayed-startup notification.
  let migrationRan = false;
  const migrationObserver = {
    observe(subject, topic) {
      if (topic !== "browser-delayed-startup-finished") return;
      if (migrationRan) return;
      migrationRan = true;
      try { runUiMigration(); }
      catch (e) { anon_log("runUiMigration threw: " + e); }

      try { Services.obs.removeObserver(migrationObserver, topic); }
      catch (_) {}
    },
  };
  Services.obs.addObserver(migrationObserver,
                           "browser-delayed-startup-finished");

  // (Section 5 removed: the WebExtension auto-grant was needed when
  // an extension handled .anon URL-bar interception. The browser now
  // handles .anon natively via the URL-bar hook in section 6 below —
  // no extension required, no permission to grant.)

  // ---------- 6. Native URL-bar .anon interception. ----------
  //
  // Patches the browser to handle `.anon` URLs natively (no extension
  // required). On every top-level navigation:
  //   - If the destination host ends in `.anon`, rewrite the channel to
  //     the local bridge UI with the anon URL as a ?url= parameter.
  //   - If the destination is a known search engine and the query term
  //     looks like a `.anon` host (i.e. the URL bar handed it to search
  //     instead of treating it as a URL), same rewrite.
  //
  // Both cases prevent the .anon hostname from leaking to DNS / search
  // engines. The bridge UI then auto-navigates because of its `?url=`
  // bootstrap hook (bin/anon-browse-gui.mjs HTML_UI).
  //
  // Equivalent to Tor Browser's C++ docshell patches for `.onion`, but
  // implemented at the JS-chrome layer so it ships in the autoconfig
  // without rebuilding Firefox.
  //
  // Bridge URL is hardcoded; the launcher always pins it to
  // 127.0.0.1:1081 with --no-token, so no auth is needed.
  const ANON_BRIDGE_BASE = "http://127.0.0.1:1081";

  // ---------- Pretty-URL trust registry ----------
  //
  // The URL bar displays `anon://x.anon` while the real load is to
  // `bridge?url=anon%3A%2F%2Fx.anon`. Without a trust check, a hostile
  // page could call:
  //
  //     history.replaceState(null, '', '/?url=anon%3A%2F%2Fevil.anon')
  //
  // and the substitution would happily display anon://evil.anon while
  // the page content remains the original — classic address-bar spoof.
  //
  // Fix: only substitute for bridge URLs we ourselves registered as
  // trusted, scoped per <browser>. URL-bar input registers; clicks
  // from inside the bridge origin register (the bridge is our code);
  // anything else loads but does NOT get the pretty form.
  //
  // WeakMap keyed by <browser> so a closed tab's registrations get
  // collected automatically.
  const PRETTY_MAP = new WeakMap();
  const PRETTY_MAX_PER_BROWSER = 16;

  const registerPretty = (browser, bridgeUrl, anonUrl) => {
    if (!browser || !bridgeUrl || !anonUrl) return;
    let m = PRETTY_MAP.get(browser);
    if (!m) { m = new Map(); PRETTY_MAP.set(browser, m); }
    m.set(bridgeUrl, anonUrl);
    // Bound to last N entries — rapid back/forward shouldn't grow
    // unbounded. Map insertion order is preserved; oldest goes first.
    while (m.size > PRETTY_MAX_PER_BROWSER) {
      const oldest = m.keys().next().value;
      m.delete(oldest);
    }
  };

  const lookupPretty = (browser, currentSpec) => {
    if (!browser) return null;
    const m = PRETTY_MAP.get(browser);
    return m ? (m.get(currentSpec) || null) : null;
  };

  const browserOfChannel = (channel) => {
    try {
      const bc = channel.loadInfo && channel.loadInfo.browsingContext;
      return bc ? bc.embedderElement : null;
    } catch (_) {
      return null;
    }
  };

  const isTrustedTrigger = (loadInfo) => {
    try {
      const tp = loadInfo && loadInfo.triggeringPrincipal;
      if (!tp) return false;
      if (tp.isSystemPrincipal) return true;          // URL bar, chrome
      // A click from inside the bridge UI itself — bridge HTML serves
      // <a href="?url=anon://..."> links and we want those to display
      // pretty too.
      const spec = (tp.URI && tp.URI.spec) || "";
      return spec.startsWith(ANON_BRIDGE_BASE);
    } catch (_) {
      return false;
    }
  };

  // ---------- Onion-fingerprint chip ----------
  //
  // A 4-square visual hash of the current anon:// host. Renders in the
  // URL bar next to the identity-box whenever pretty-URL substitution
  // shows an anon:// address. Same site = same chip across sessions
  // and devices; typosquatted lookalikes hash differently and show a
  // visibly different chip. Defends the load-bearing pretty-URL UI by
  // giving the user a glanceable trust anchor that page content can't
  // forge.
  //
  // The hash is SHA-256(host); we use 4 bytes → 4 colors from a
  // 16-entry palette. SHA-256 is overkill cryptographically — what we
  // need is a uniform distribution over the palette, which it provides.
  //
  // Palette is high-contrast on black; ~16 visually distinct colors so
  // adjacent hash bytes don't accidentally pick near-duplicates.
  const FP_PALETTE = [
    "#ff4444", "#ff9933", "#ffee33", "#99ff44",
    "#33ee77", "#33eedd", "#3399ff", "#5566ff",
    "#aa55ff", "#ee55ee", "#ff5588", "#ffffff",
    "#888888", "#bb6622", "#447755", "#664488",
  ];

  const sha256Bytes = (str) => {
    try {
      // nsIScriptableUnicodeConverter.convertToByteArray was removed
      // from recent Firefox; use TextEncoder + nsICryptoHash instead.
      // nsICryptoHash.update accepts an array-like of bytes plus a
      // length, and Uint8Array satisfies that contract.
      const data = new TextEncoder().encode(str);
      const ch = Cc["@mozilla.org/security/hash;1"]
        .createInstance(Ci.nsICryptoHash);
      ch.init(ch.SHA256);
      ch.update(data, data.length);
      const bin = ch.finish(false);
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i += 1) out[i] = bin.charCodeAt(i);
      return out;
    } catch (e) {
      anon_log("sha256Bytes failed: " + e);
      return new Uint8Array(32);
    }
  };

  const fingerprintFor = (anonUrl) => {
    let host = "";
    try {
      const m = /^anon:\/\/([^\/?#]+)/i.exec(anonUrl || "");
      host = m ? m[1].toLowerCase() : String(anonUrl || "");
    } catch (_) {
      host = String(anonUrl || "");
    }
    const h = sha256Bytes(host);
    return [
      FP_PALETTE[h[0] & 0x0f],
      FP_PALETTE[h[1] & 0x0f],
      FP_PALETTE[h[2] & 0x0f],
      FP_PALETTE[h[3] & 0x0f],
    ];
  };

  const updateFingerprintChip = (win, anonUrl) => {
    try {
      const doc = win && win.document;
      if (!doc) return;
      let chip = doc.getElementById("anon-fp-chip");
      if (!chip) {
        // Inject after identity-box. If we can't find it, give up
        // quietly — chip is decorative; URL-bar text already shows
        // the anon address.
        const identityBox = doc.getElementById("identity-box")
          || doc.getElementById("tracking-protection-icon-container");
        if (!identityBox || !identityBox.parentNode) return;
        chip = doc.createXULElement("hbox");
        chip.id = "anon-fp-chip";
        chip.className = "anon-fp-chip";
        chip.setAttribute("align", "center");
        for (let i = 0; i < 4; i += 1) {
          const sq = doc.createXULElement("box");
          sq.className = "anon-fp-sq";
          sq.setAttribute("anon-fp-idx", String(i));
          chip.appendChild(sq);
        }
        identityBox.parentNode.insertBefore(chip, identityBox.nextSibling);
      }
      if (anonUrl) {
        const colors = fingerprintFor(anonUrl);
        const sqs = chip.children;
        for (let i = 0; i < 4 && i < sqs.length; i += 1) {
          sqs[i].style.backgroundColor = colors[i];
        }
        chip.setAttribute("anon-fp-show", "true");
        chip.setAttribute("tooltiptext",
          "Anon fingerprint: " + colors.join(" ") +
          "\nIf this chip differs from what you remember for this site, " +
          "the address may be a typosquat.");
      } else {
        chip.removeAttribute("anon-fp-show");
      }
    } catch (e) {
      anon_log("updateFingerprintChip failed: " + e);
    }
  };

  const SEARCH_HOSTS = new Set([
    "duckduckgo.com", "www.duckduckgo.com", "html.duckduckgo.com",
    "leta.mullvad.net", "www.leta.mullvad.net",
    "google.com", "www.google.com",
    "bing.com", "www.bing.com",
    "startpage.com", "www.startpage.com",
    "search.brave.com",
    "qwant.com", "www.qwant.com",
  ]);
  const SEARCH_TERM_PARAMS = ["q", "query", "p", "wd", "text", "eingabe"];
  const ANON_HOST_RE = /^([a-z0-9][a-z0-9.\-]*\.anon)(?:[\/:?#].*)?$/i;

  // Hand-rolled query-string parser because URLSearchParams isn't
  // available in mozilla.cfg's scope (no DOM globals).
  const parseQuery = (queryStr) => {
    const out = {};
    if (!queryStr) return out;
    for (const pair of queryStr.split("&")) {
      const eq = pair.indexOf("=");
      const k = eq < 0 ? pair : pair.slice(0, eq);
      const v = eq < 0 ? "" : pair.slice(eq + 1);
      if (!k) continue;
      try { out[decodeURIComponent(k)] = decodeURIComponent(v.replace(/\+/g, " ")); }
      catch { out[k] = v; }
    }
    return out;
  };

  const detectAnonRedirectTarget = (uri) => {
    try {
      const host = (uri.host || "").toLowerCase();
      // Direct *.anon navigation (URL-fixup decided it was a URL).
      if (host.endsWith(".anon")) {
        return "anon://" + host + (uri.pathQueryRef || "/");
      }
      // Search-engine fallback (URL-fixup handed input to default
      // search and the term contains a .anon address).
      if (SEARCH_HOSTS.has(host)) {
        const queryStr = (uri.query || "").replace(/^\?/, "");
        const params = parseQuery(queryStr);
        for (const p of SEARCH_TERM_PARAMS) {
          const v = params[p];
          if (!v) continue;
          const m = ANON_HOST_RE.exec(v.trim());
          if (m) return "anon://" + v.trim();
        }
      }
    } catch (e) {
      anon_log("detectAnonRedirectTarget: " + e);
    }
    return null;
  };

  // ---------- First-party SOCKS-auth isolation (best-effort) ----------
  //
  // Tor Browser ships a Firefox SOURCE PATCH that selects a unique
  // SOCKS username per-request based on loadInfo's first-party,
  // giving each origin its own Tor circuit (IsolateSOCKSAuth in
  // torrc is default-on, so changing the user partitions circuits).
  //
  // We don't ship a patched Firefox. The closest we can do from the
  // chrome JS layer is to bump `network.proxy.socks_username` to the
  // first-party host on every top-level document load.
  //
  // LIMITATIONS — read this before flipping the pref:
  //   - Firefox reads socks_username at SOCKS-connection-establishment
  //     time, NOT per request. Pooled SOCKS connections reuse the
  //     user/pass at the time the connection opened.
  //   - Concurrent loads in different tabs RACE on the global pref.
  //     If tab A is mid-load and tab B starts loading, A's
  //     subresources may pick up B's username.
  //   - Destination-based isolation (IsolateDestAddr in torrc, see
  //     [[reference_da_recovery]]) already gives per-onion circuit
  //     separation. This adds per-FIRST-PARTY separation on top —
  //     so two visits to the same site at different times share a
  //     circuit pool while a separate site gets a different one.
  //
  // OFF by default. Flip `anon.firstparty.socks-isolation` true to
  // enable. The proper fix is filed in tasks; until then this is the
  // best chrome-JS-only approximation.
  const FP_ISOL_PREF = "anon.firstparty.socks-isolation";
  const FP_SOCKS_USER_PREF = "network.proxy.socks_username";

  const setFirstPartySocksUser = (host) => {
    try {
      if (!Services.prefs.getBoolPref(FP_ISOL_PREF, false)) return;
      if (!host) return;
      // Truncate to keep the SOCKS auth payload bounded (255-byte limit
      // per RFC 1929) and lowercase for stability.
      const tag = "fp-" + String(host).toLowerCase().slice(0, 60);
      const current = Services.prefs.getCharPref(FP_SOCKS_USER_PREF, "");
      if (current !== tag) {
        Services.prefs.setCharPref(FP_SOCKS_USER_PREF, tag);
        // Empty pass is fine; Tor only keys on the user/pass PAIR for
        // isolation, and both must hash to the same value across
        // requests for circuit reuse. Empty pass is a stable second-half.
        Services.prefs.setCharPref("network.proxy.socks_password", "");
      }
    } catch (e) {
      anon_log("setFirstPartySocksUser failed: " + e);
    }
  };

  // Hosts allowed even in onion-only mode (loopback for bridge /
  // tor control / i2pd; .onion + .anon for the actual anonymity nets).
  const isOnionOnlyAllowedHost = (host) => {
    if (!host) return false;
    const h = host.toLowerCase();
    if (h === "localhost" || h === "127.0.0.1" || h === "::1") return true;
    if (/^127\.\d+\.\d+\.\d+$/.test(h)) return true;
    if (h.endsWith(".onion")) return true;
    if (h.endsWith(".anon")) return true;
    return false;
  };

  const urlbarObserver = {
    observe(subject, topic) {
      if (topic !== "http-on-modify-request") return;
      try {
        const channel = subject.QueryInterface(Ci.nsIHttpChannel);
        const loadInfo = channel.loadInfo;
        const isDoc = loadInfo
          && loadInfo.externalContentPolicyType === Ci.nsIContentPolicy.TYPE_DOCUMENT;
        const spec = channel.URI.spec;
        const specPrefix = spec.slice(0, 120);

        // GATE: onion-only mode. Cancel anything that isn't on the
        // allowlist BEFORE any redirect / pretty-URL bookkeeping fires.
        // Applies to docs AND subresources so a hostile page can't
        // sneak a clearnet pixel through.
        if (Services.prefs.getBoolPref(ONION_ONLY_PREF, false)) {
          if (!isOnionOnlyAllowedHost(channel.URI.host)) {
            anon_log("ONION-ONLY: blocking " + specPrefix);
            try { channel.cancel(Cr.NS_BINDING_ABORTED); } catch (_) {}
            return;
          }
        }

        // CASE A: navigation TO the bridge itself with ?url=anon://...
        //
        // This is what fires on (a) the URL-bar hook's openLinkIn
        // (system principal) and (b) any link click inside the bridge
        // UI (bridge origin). Register the (bridge URL → anon URL)
        // pair as trusted so the pretty-URL substitution will display
        // anon://... in the URL bar instead of the bridge URL.
        //
        // For untrusted triggers (any other origin linking to the
        // bridge), don't register — load still happens, URL bar
        // shows the bridge URL. No spoofing risk.
        if (spec.startsWith(ANON_BRIDGE_BASE) && isDoc) {
          try {
            const q = spec.indexOf("?");
            if (q >= 0) {
              const params = parseQuery(spec.slice(q + 1));
              const u = params.url || params.u;
              if (u && /^anon:\/\//i.test(u) && isTrustedTrigger(loadInfo)) {
                const br = browserOfChannel(channel);
                registerPretty(br, spec, u);
              }
            }
          } catch (eReg) {
            anon_log("bridge nav registerPretty failed: " + eReg);
          }
          return;   // never redirect a bridge URL
        }

        if (!isDoc) return; // skip subresources

        anon_log("urlbar observer saw doc-load: " + specPrefix);

        // CASE B: navigation to a .anon host or a search-engine URL
        // whose query is a .anon target. Redirect through the bridge.
        const anonUrl = detectAnonRedirectTarget(channel.URI);
        if (!anonUrl) {
          anon_log("  -> no .anon match, leaving alone");
          return;
        }

        const target = ANON_BRIDGE_BASE + "/?url=" + encodeURIComponent(anonUrl);
        anon_log("  -> intercept: redirecting to " + target);

        // Register pretty-URL substitution ONLY when the trigger is
        // trusted (system principal / chrome / bridge origin). For
        // untrusted triggers we still redirect — that's a no-DNS-leak
        // protection — but the URL bar will show the bridge URL, not
        // the anon URL. This prevents history.pushState / replaceState
        // spoofs from rewriting the address bar to lie about content.
        if (isTrustedTrigger(loadInfo)) {
          const br = browserOfChannel(channel);
          registerPretty(br, target, anonUrl);
        }

        channel.redirectTo(Services.io.newURI(target));

      } catch (e) {
        anon_log("urlbar observer threw: " + e + (e.stack ? "\n" + e.stack : ""));
      }
    },
  };
  Services.obs.addObserver(urlbarObserver, "http-on-modify-request");
  anon_log("urlbar .anon interceptor armed (http-on-modify-request)");

  // ---------- 6b. URL-bar submit-time hook ----------
  //
  // The http-on-modify-request observer above only fires AFTER Firefox
  // decides to create an HTTP channel. For inputs with an unknown TLD
  // (.anon isn't in the PSL), Firefox may reject the URL at the
  // fixup/parsing stage before ever creating a channel — leaving the
  // user with a blank page.
  //
  // This hook catches input AT SUBMIT TIME (Enter pressed in URL bar)
  // by monkey-patching gURLBar.handleCommand on each browser window.
  // If the typed input looks like a .anon target, we redirect the load
  // to the bridge UI directly. Falls through to the original
  // handleCommand for everything else.

  const detectAnonFromInput = (raw) => {
    let s = String(raw || "").trim();
    if (!s) return null;
    // Strip recognized schemes.
    for (const prefix of ["anon://", "web+anon://", "http://", "https://"]) {
      if (s.toLowerCase().startsWith(prefix)) { s = s.slice(prefix.length); break; }
    }
    // Identify host portion (everything up to first /, ?, #).
    const sep = s.search(/[\/?#]/);
    const host = (sep === -1 ? s : s.slice(0, sep)).toLowerCase();
    const rest = sep === -1 ? "" : s.slice(sep);
    if (!host.endsWith(".anon")) return null;
    // Reject if any label is malformed (defensive against random text
    // containing ".anon" mid-string).
    const labels = host.split(".");
    if (labels.length < 2) return null;
    for (const label of labels) {
      if (!/^[a-z0-9][a-z0-9-]{0,62}$/i.test(label)) return null;
    }
    return "anon://" + host + rest;
  };

  const installUrlbarHook = (win) => {
    try {
      if (!win || win.closed) return;
      const urlbar = win.gURLBar;
      if (!urlbar || urlbar._anonHookInstalled) return;
      urlbar._anonHookInstalled = true;

      const origHandleCommand = urlbar.handleCommand.bind(urlbar);
      urlbar.handleCommand = function(...args) {
        try {
          const raw = (typeof urlbar.untrimmedValue === "string" && urlbar.untrimmedValue)
            || urlbar.value || "";
          const anonUrl = detectAnonFromInput(raw);
          if (anonUrl) {
            const bridge = ANON_BRIDGE_BASE + "/?url=" + encodeURIComponent(anonUrl);
            anon_log("urlbar submit intercepted: " + raw + " -> " + bridge);
            urlbar._anonPrettyTarget = anonUrl;
            // Register this (bridge -> anon) mapping as trusted on the
            // current browser. Pretty-URL substitution will only fire
            // for entries that pass this gate, blocking page-driven
            // history.replaceState() address-bar spoofs.
            try {
              const targetBrowser = win.gBrowser && win.gBrowser.selectedBrowser;
              registerPretty(targetBrowser, bridge, anonUrl);
            } catch (e) {
              anon_log("registerPretty from urlbar threw: " + e);
            }
            // Directly navigate the current tab to the bridge URL.
            // We do NOT fall through to origHandleCommand — by the time
            // handleCommand runs, Firefox has already parsed the input
            // into a "search query" intent (because .anon isn't in the
            // PSL) and overwriting urlbar.value doesn't undo that.
            try {
              win.openLinkIn(bridge, "current", {
                triggeringPrincipal: Services.scriptSecurityManager.getSystemPrincipal(),
                inBackground: false,
                allowThirdPartyFixup: false,
              });
            } catch (e1) {
              anon_log("openLinkIn failed: " + e1 + " — trying gBrowser.loadURI");
              try {
                win.gBrowser.loadURI(Services.io.newURI(bridge), {
                  triggeringPrincipal: Services.scriptSecurityManager.getSystemPrincipal(),
                });
              } catch (e2) {
                anon_log("gBrowser.loadURI also failed: " + e2);
              }
            }

            // Immediately reflect the pretty URL in the URL bar. The
            // location-change progress listener should ALSO re-apply
            // it on every commit (so reload + back/forward work),
            // but this gives instant feedback and doesn't depend on
            // the listener firing at all.
            try {
              urlbar.value = anonUrl;
              updateFingerprintChip(win, anonUrl);
              anon_log("urlbar pretty-set to " + anonUrl);
              // And re-apply on the next few ticks in case Firefox
              // overwrites it during navigation commit.
              for (const delay of [50, 200, 500, 1500]) {
                win.setTimeout(() => {
                  try {
                    const browser = win.gBrowser.selectedBrowser;
                    if (extractAnonFromBridgeUri(browser, browser?.currentURI?.spec)) {
                      urlbar.value = anonUrl;
                    }
                  } catch {}
                }, delay);
              }
            } catch (e) {
              anon_log("pretty-URL immediate set failed: " + e);
            }
            return;
          }
        } catch (e) {
          anon_log("urlbar handleCommand override threw: " + e);
        }
        return origHandleCommand(...args);
      };

      // ---- Pretty-URL substitution ----
      //
      // Goal: even though Firefox actually loads the bridge URL, the
      // URL bar should display the anon:// address (like Tor Browser
      // displays .onion). Three layers, defense-in-depth:
      //
      // (1) gURLBar.setURI override — the canonical "show this URI"
      //     method Firefox calls on every commit / tab switch.
      //     Substitute anon:// when the URI is the bridge URL.
      // (2) Progress listener — fires on location change for
      //     redundancy in case setURI isn't called via the override
      //     path (e.g. some internal path uses a different setter).
      // (3) Immediate urlbar.value = anonUrl in the handleCommand
      //     override + scheduled retries, for instant feedback before
      //     either of the above fires.
      const bridgePrefix = ANON_BRIDGE_BASE + "/";
      // Registry-based lookup. Returns the anon URL ONLY if (browser,
      // spec) was previously registered via registerPretty() from a
      // trusted source. Cannot be forged by page content.
      const extractAnonFromBridgeUri = (browser, spec) => {
        if (!browser || typeof spec !== "string") return null;
        if (!spec.startsWith(bridgePrefix)) return null;
        return lookupPretty(browser, spec);
      };

      const applyPrettyUrl = (browser) => {
        try {
          if (!browser || browser !== win.gBrowser.selectedBrowser) return;
          const currentSpec = browser.currentURI && browser.currentURI.spec;
          const anon = extractAnonFromBridgeUri(browser, currentSpec);
          if (!anon) {
            // Navigation moved off an anon URL — clear the chip so it
            // doesn't claim a fingerprint for a non-anon page.
            updateFingerprintChip(win, null);
            return;
          }
          if (urlbar.value && !urlbar.value.startsWith(bridgePrefix)) {
            // Some other code path already wrote a non-bridge value
            // (e.g. user is mid-edit). Still keep the chip in sync.
            updateFingerprintChip(win, anon);
            return;
          }
          urlbar.value = anon;
          updateFingerprintChip(win, anon);
          anon_log("pretty-URL listener replaced bar with " + anon);
        } catch (e) {
          anon_log("applyPrettyUrl threw: " + e);
        }
      };

      const progressListener = {
        QueryInterface: ChromeUtils.generateQI([
          "nsIWebProgressListener",
          "nsISupportsWeakReference",
        ]),
        onLocationChange(webProgress, request, locationURI, flags) {
          // Fired both on top-level and frame loads; we only care about
          // top-level (the selected browser).
          //
          // CRITICAL: ignore same-document changes (pushState /
          // replaceState). Without this, a page could call
          // history.replaceState(null, '', '/?url=anon://evil.anon')
          // and trigger pretty-URL substitution to display evil.anon
          // in the URL bar while the page content stays put — classic
          // address-bar spoof.
          try {
            const SAME_DOC = Ci.nsIWebProgressListener.LOCATION_CHANGE_SAME_DOCUMENT;
            if (flags & SAME_DOC) return;
            applyPrettyUrl(win.gBrowser.selectedBrowser);
          } catch (e) {
            anon_log("onLocationChange handler threw: " + e);
          }
        },
        onStateChange() {},
        onProgressChange() {},
        onStatusChange() {},
        onSecurityChange() {},
        onContentBlockingEvent() {},
      };
      try {
        win.gBrowser.addProgressListener(progressListener);
      } catch (e) {
        anon_log("progressListener install failed: " + e);
      }

      // setURI override — this is what Firefox calls every time the
      // URL bar should re-render (commit, tab switch, reload, focus
      // change). By substituting at this layer, the bridge URL never
      // gets the chance to be displayed; the override is consulted
      // before the value reaches the input field.
      try {
        if (typeof urlbar.setURI === "function" && !urlbar._anonSetURIInstalled) {
          urlbar._anonSetURIInstalled = true;
          const origSetURI = urlbar.setURI.bind(urlbar);
          urlbar.setURI = function(uri, ...rest) {
            try {
              if (uri && uri.spec && uri.spec.startsWith(bridgePrefix)) {
                const browser = win.gBrowser && win.gBrowser.selectedBrowser;
                const anon = extractAnonFromBridgeUri(browser, uri.spec);
                if (anon) {
                  const r = origSetURI(uri, ...rest);
                  // After the canonical setter runs (which sets value
                  // from currentURI), overwrite to the pretty form.
                  urlbar.value = anon;
                  if (urlbar.inputField) urlbar.inputField.value = anon;
                  updateFingerprintChip(win, anon);
                  anon_log("setURI override displayed " + anon);
                  return r;
                }
              }
              // Setting a URI that ISN'T an anon-mapped bridge URL —
              // clear the chip so it doesn't claim a fingerprint for
              // an unrelated page.
              updateFingerprintChip(win, null);
            } catch (e) {
              anon_log("setURI override threw: " + e);
            }
            return origSetURI(uri, ...rest);
          };
          anon_log("gURLBar.setURI override installed");
        }
      } catch (e) {
        anon_log("setURI override install failed: " + e);
      }

      applyPrettyUrl(win.gBrowser.selectedBrowser);

      // Mark the document root so userChrome.css can render the
      // `tor:on` pip next to the identity icon. anon.tor.enabled is
      // set earlier (section 3) based on PAC presence.
      try {
        const torOn = Services.prefs.getBoolPref("anon.tor.enabled", false);
        win.document.documentElement.setAttribute(
          "anon-tor", torOn ? "on" : "off");
      } catch (e) {
        anon_log("anon-tor attribute set failed: " + e);
      }

      // CustomizableUI registers widgets in autoconfig (early) but
      // when the nav-bar restored its DOM from the saved layout the
      // widget definitions hadn't materialized in the window yet, so
      // it silently dropped the IDs. Neither `ensureWidgetPlacedIn-
      // Window` nor `addWidgetToArea` rescues them on Firefox 140.
      // Workaround: build the toolbarbutton nodes ourselves and slot
      // them in after #urlbar-container. The CustomizableUI registry
      // still holds the widget definitions, so the Customize panel
      // and onCommand handlers remain functional.
      try {
        const doc = win.document;
        const anchor = doc.getElementById("urlbar-container");
        if (anchor && anchor.parentNode) {
          const torOn = pacFile.exists();
          const curLvl = Services.prefs.getIntPref(SEC_LEVEL_PREF, 0);
          const buttons = [
            { id: SEC_LEVEL_ID,
              label: SEC_LEVELS[curLvl].name,
              tooltip: "Security Level — click to change.",
              attrs: { "anon-security-level": String(curLvl) },
              handler: onSecurityLevelCommand },
            { id: NEW_IDENTITY_ID,
              label: "New Identity",
              tooltip: "Restart with a fresh Tor circuit + clean session.",
              handler: onNewIdentityCommand },
            { id: PANIC_ID,
              label: "Panic",
              tooltip: "Wipe cookies, history, cache, storage — then restart. (Ctrl+Alt+P)",
              handler: onPanicCommand },
            { id: VOLATILE_ID,
              label: isVolatileSession() ? "Volatile: on" : "Volatile: off",
              tooltip: isVolatileSession()
                ? "Profile is in tmpfs. Click to switch back to persistent."
                : "Restart with a RAM-only profile (wiped on exit).",
              handler: onVolatileCommand },
            { id: ONION_ONLY_ID,
              label: isOnionOnlyEnabled() ? "Onion-only: on" : "Onion-only: off",
              tooltip: "When on, blocks every clearnet request. Only .onion / .anon / loopback load.",
              attrs: { "anon-onion-only": isOnionOnlyEnabled() ? "on" : "off" },
              handler: onOnionOnlyCommand },
            { id: TOR_STATUS_ID,
              label: torOn ? "Tor: on" : "Tor: off",
              tooltip: torOn ? "Tor is running." : "Tor is not running.",
              handler: onTorStatusCommand },
          ];

          // Walk in reverse so each insertion lands right after anchor —
          // final reading order: anchor, SEC, NEW_ID, PANIC, VOLATILE, ONION-ONLY, TOR.
          let cursor = anchor.nextSibling;
          for (const def of buttons.slice().reverse()) {
            if (doc.getElementById(def.id)) continue;
            const btn = doc.createXULElement("toolbarbutton");
            btn.id = def.id;
            btn.className =
              "toolbarbutton-1 chromeclass-toolbar-additional anon-toolbar-button";
            btn.setAttribute("label", def.label);
            btn.setAttribute("tooltiptext", def.tooltip);
            btn.setAttribute("removable", "true");
            if (def.attrs) {
              for (const [k, v] of Object.entries(def.attrs)) {
                btn.setAttribute(k, v);
              }
            }
            if (def.handler) {
              btn.addEventListener("command", def.handler);
            }
            anchor.parentNode.insertBefore(btn, cursor);
            cursor = btn;
          }
          anon_log("manually placed anon toolbarbuttons after urlbar");
        } else {
          anon_log("could not find urlbar-container for manual placement");
        }
      } catch (e) {
        anon_log("manual button placement failed: " + e);
      }

      // ---------- Panic keybind ----------
      //
      // Ctrl+Alt+P from anywhere in the chrome fires the same handler
      // as the toolbar button. Capture phase so we beat any content
      // handler that might want to swallow the key.
      try {
        if (!win._anonPanicKeyBound) {
          win._anonPanicKeyBound = true;
          const panicKeyHandler = (e) => {
            if (e.ctrlKey && e.altKey && !e.shiftKey && !e.metaKey
                && (e.key === "p" || e.key === "P")) {
              e.preventDefault();
              e.stopPropagation();
              try { onPanicCommand(); }
              catch (err) { anon_log("panic key fired but handler threw: " + err); }
            }
          };
          win.addEventListener("keydown", panicKeyHandler, true);
          anon_log("panic keybind armed (Ctrl+Alt+P)");
        }
      } catch (e) {
        anon_log("panic keybind install failed: " + e);
      }

      anon_log("urlbar handleCommand hook + pretty-URL listener + setURI override installed on a window");
    } catch (e) {
      anon_log("installUrlbarHook failed: " + e);
    }
  };

  const wmListener = {
    onOpenWindow(xulWin) {
      try {
        const win = xulWin.docShell.domWindow;
        win.addEventListener("load", () => installUrlbarHook(win), { once: true });
      } catch (e) {
        anon_log("wmListener.onOpenWindow threw: " + e);
      }
    },
    onCloseWindow() {},
  };
  Services.wm.addListener(wmListener);
  // Cover windows already open (e.g. on profile-reuse).
  for (const win of Services.wm.getEnumerator("navigator:browser")) {
    installUrlbarHook(win);
  }
  anon_log("urlbar submit-time hook armed (window listener)");
} catch (e) {
  // Surface to the browser console; never throw, or Firefox refuses
  // to start.
  anon_log("startup error: " + e + (e.stack ? "\n" + e.stack : ""));
}
