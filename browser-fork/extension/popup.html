<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Anon Layer</title>
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'self'; script-src 'self'; img-src 'self';">
<link rel="stylesheet" href="common.css">
<style>
  body { width: 320px; }
  main { padding: 16px; }
  .pop-row { display: flex; gap: 6px; margin-top: 8px; }
  .pop-row input { flex: 1; }
  h3 { margin: 0 0 6px; font-size: 14px; color: var(--muted); }
</style>
</head>
<body>
<main>
  <h3>Open an anon:// URL</h3>
  <div class="pop-row">
    <input id="u" type="text" placeholder="anon://foo.anon/path">
    <button id="go" class="btn primary">Go</button>
  </div>
  <div class="pop-row" style="margin-top: 14px; justify-content: space-between;">
    <button id="newtab" class="btn">New blank tab</button>
    <button id="opts"   class="btn">Settings</button>
  </div>
</main>
<script src="popup.js"></script>
</body>
</html>
