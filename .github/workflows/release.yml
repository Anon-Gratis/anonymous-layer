# Release pipeline — builds Linux + Windows + macOS artifacts on every
# v* tag push and attaches them to the GitHub release.
#
# Trigger model: tag push only. PRs and main pushes are handled by
# ci.yml (tests, audit) and don't produce release artifacts.
#
# Build matrix:
#   linux-amd64   — ubuntu-latest, repackage-mullvad.sh
#   windows-amd64 — ubuntu-latest (cross-build), repackage-mullvad-windows.sh
#   macos-arm64   — macos-latest (Apple silicon runner), repackage-mullvad-macos.sh
#   macos-amd64   — macos-13     (Intel runner),         repackage-mullvad-macos.sh
#   node          — ubuntu-latest, headless source tarball
#                   (daemons + CLI + library, no browser-fork/)
#
# Each browser job produces a .tar.xz / .zip / .dmg + matching .sha256;
# the node job produces anonymous-layer-node-${VERSION}.tar.xz + .sha256.
# The publish job collects all artifacts and (a) attaches them to the
# tag's GitHub release, (b) writes an aggregate SHA256SUMS, and
# (c) signs SHA256SUMS with GPG if the GPG_PRIVATE_KEY secret is set.
#
# publish-npm publishes the headless package to the npm registry. It
# only runs when the NPM_TOKEN secret is set; otherwise it skips with
# a notice. The package contents are controlled by the `files` field
# in package.json — `browser-fork/`, `dist/`, and `node_modules/` are
# never shipped to the registry.

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.2.0). Required for manual dispatch.'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # never cancel a release build mid-flight

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '20.20.1'

permissions:
  contents: write  # required to upload assets to the release

jobs:
  # ---------- linux ----------

  build-linux:
    name: Build linux-amd64 tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xz-utils zip curl tar gpg python3-pil

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build
        run: |
          chmod +x browser-fork/scripts/repackage-mullvad.sh
          ./browser-fork/scripts/repackage-mullvad.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: |
            dist/anonymous-*-linux-x86_64.tar.xz
            dist/anonymous-*-linux-x86_64.tar.xz.sha256
          if-no-files-found: error

  # ---------- windows (built FROM ubuntu) ----------

  build-windows:
    name: Build windows-amd64 zip (cross-built from Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            p7zip-full zip unzip curl gpg python3-pil

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: browser-fork/launcher-go/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build
        run: |
          chmod +x browser-fork/scripts/repackage-mullvad-windows.sh
          ./browser-fork/scripts/repackage-mullvad-windows.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: |
            dist/anonymous-*-windows-x86_64.zip
            dist/anonymous-*-windows-x86_64.zip.sha256
          if-no-files-found: error

  # ---------- macOS (one job per arch) ----------

  build-macos:
    name: Build macos-${{ matrix.arch.label }} dmg
    runs-on: ${{ matrix.arch.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - { label: arm64,  runner: macos-latest, name: arm64  }
          - { label: amd64,  runner: macos-13,     name: x86_64 }
    steps:
      - uses: actions/checkout@v4

      - name: Install Python + Pillow
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user Pillow

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: browser-fork/launcher-go/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build
        run: |
          chmod +x browser-fork/scripts/repackage-mullvad-macos.sh
          ./browser-fork/scripts/repackage-mullvad-macos.sh --arch ${{ matrix.arch.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch.label }}
          path: |
            dist/anonymous-*-macos-${{ matrix.arch.name }}.dmg
            dist/anonymous-*-macos-${{ matrix.arch.name }}.dmg.sha256
          if-no-files-found: error

  # ---------- headless node tarball (daemons + CLI + library) ----------

  build-node:
    name: Build headless node tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve version from tag
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            REF="${{ github.event.inputs.tag }}"
          else
            REF="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${REF#v}"
          if [[ -z "$VERSION" ]]; then
            echo "::error::could not resolve version from tag '$REF'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved VERSION=$VERSION"

      - name: Install + test before packaging
        run: |
          npm ci
          # test:node skips the browser-fork extension tests — those
          # files aren't shipped in the headless tarball or npm package.
          npm run test:node

      - name: Stamp package.json with tag version
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.version = process.env.VERSION;
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 1) + "\n");
            console.log("stamped version =", pkg.version);
          '

      - name: Build source tarball
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          STAGE="anonymous-layer-node-${VERSION}"
          mkdir -p "dist/${STAGE}"
          # Headless surface only — no browser-fork, no node_modules, no dist.
          # Mirrors the npm `files` field in package.json; keep the two in sync.
          for path in \
              bin modules deploy docs test-vectors \
              package.json package-lock.json tests.mjs \
              LICENSE README.md SECURITY.md AUDIT_PREP.md CONTRIBUTING.md; do
            if [[ -e "$path" ]]; then
              cp -R "$path" "dist/${STAGE}/"
            fi
          done
          ( cd dist && tar --owner=0 --group=0 --numeric-owner \
              -cJf "anonymous-layer-node-${VERSION}.tar.xz" \
              "anonymous-layer-node-${VERSION}" )
          rm -rf "dist/${STAGE}"
          ( cd dist && sha256sum "anonymous-layer-node-${VERSION}.tar.xz" \
              > "anonymous-layer-node-${VERSION}.tar.xz.sha256" )
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-source
          path: |
            dist/anonymous-layer-node-*.tar.xz
            dist/anonymous-layer-node-*.tar.xz.sha256
          if-no-files-found: error

  # ---------- publish to GitHub release ----------

  publish:
    name: Publish to GitHub release
    needs: [build-linux, build-windows, build-macos, build-node]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten + write aggregate SHA256SUMS
        run: |
          mkdir -p release/
          # Move every artifact + its per-file sha256 into release/
          find artifacts/ -type f \( -name '*.tar.xz' -o -name '*.zip' -o -name '*.dmg' \
                                   -o -name '*.sha256' \) -exec cp -t release/ {} +
          ( cd release && \
            sha256sum -- *.tar.xz *.zip *.dmg 2>/dev/null | sort > SHA256SUMS )
          echo "--- release/ ---"; ls -la release/
          echo "--- SHA256SUMS ---"; cat release/SHA256SUMS

      - name: Detect GPG secret presence
        run: |
          if [[ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]]; then
            echo "GPG_KEY_PRESENT=1" >> "$GITHUB_ENV"
          else
            echo "GPG_KEY_PRESENT=0" >> "$GITHUB_ENV"
            echo "::notice::GPG_PRIVATE_KEY secret not set; SHA256SUMS will be unsigned."
          fi

      - name: Sign SHA256SUMS (optional — only if GPG_PRIVATE_KEY is set)
        if: ${{ env.GPG_KEY_PRESENT == '1' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --keyid-format=long | grep -E '^sec' | head -1 | sed -E 's/.*\/([0-9A-F]+).*/\1/')
          echo "signing with $KEY_ID"
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
              --local-user "$KEY_ID" \
              --output release/SHA256SUMS.asc \
              --detach-sign --armor \
              release/SHA256SUMS

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            release/*.tar.xz
            release/*.zip
            release/*.dmg
            release/*.sha256
            release/SHA256SUMS
            release/SHA256SUMS.asc

  # ---------- publish to npm (optional — gated on NPM_TOKEN) ----------

  publish-npm:
    name: Publish headless package to npm
    needs: [build-node]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - name: Detect npm secret presence
        id: gate
        run: |
          if [[ -n "${{ secrets.NPM_TOKEN }}" ]]; then
            echo "publish=1" >> "$GITHUB_OUTPUT"
          else
            echo "publish=0" >> "$GITHUB_OUTPUT"
            echo "::notice::NPM_TOKEN secret not set; skipping npm publish."
          fi

      - name: Setup Node
        if: ${{ steps.gate.outputs.publish == '1' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Resolve version from tag
        if: ${{ steps.gate.outputs.publish == '1' }}
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            REF="${{ github.event.inputs.tag }}"
          else
            REF="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${REF#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install (no scripts) + test
        if: ${{ steps.gate.outputs.publish == '1' }}
        run: |
          npm ci --ignore-scripts
          npm run test:node

      - name: Stamp package.json with tag version
        if: ${{ steps.gate.outputs.publish == '1' }}
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.version = process.env.VERSION;
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 1) + "\n");
          '

      - name: Skip if version already published
        if: ${{ steps.gate.outputs.publish == '1' }}
        id: exists
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # `npm view <pkg>@<version> version` prints the version if it
          # exists, otherwise exits non-zero (or empty). Tolerate both.
          set +e
          PUBLISHED=$(npm view "anonymous-layer@${VERSION}" version 2>/dev/null || true)
          set -e
          if [[ "$PUBLISHED" == "$VERSION" ]]; then
            echo "already=1" >> "$GITHUB_OUTPUT"
            echo "::notice::anonymous-layer@${VERSION} already on the registry; skipping publish."
          else
            echo "already=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with provenance
        if: ${{ steps.gate.outputs.publish == '1' && steps.exists.outputs.already == '0' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # --provenance attaches a GitHub-Actions–signed attestation
          # tying the published tarball to this workflow run. Requires
          # id-token: write (granted above).
          npm publish --access public --provenance
